<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Localisation Service</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --blue: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }
    h1 { margin: 0 0 8px; font-weight: 600; }
    .subtitle { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .card-label {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card-value {
      font-size: 24px;
      font-weight: 600;
    }
    .value-ok { color: var(--green); }
    .value-warn { color: var(--yellow); }
    .value-err { color: var(--red); }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button {
      background: var(--blue);
      color: white;
      border: 0;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary {
      background: var(--card);
      border: 1px solid var(--border);
    }
    .events {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .events-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .event-row {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 140px 130px 1fr;
      gap: 16px;
      font-size: 13px;
      align-items: center;
    }
    .event-row:last-child { border-bottom: 0; }
    .event-time { color: var(--muted); font-variant-numeric: tabular-nums; }
    .event-type {
      font-size: 11px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      background: var(--bg);
      display: inline-block;
      width: fit-content;
    }
    .type-translation_pushed { color: var(--green); }
    .type-webhook_received { color: var(--blue); }
    .type-webhook_ignored { color: var(--muted); }
    .type-backfill_started, .type-backfill_completed { color: var(--yellow); }
    .type-error { color: var(--red); }
    .event-message { color: var(--text); }
    .event-details {
      font-family: ui-monospace, SFMono-Regular, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
    .auth-prompt {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    input[type="password"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 6px;
      width: 300px;
      font-family: inherit;
    }
    .empty {
      padding: 32px;
      text-align: center;
      color: var(--muted);
    }
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Localisation Service</h1>
  <div class="subtitle">Lokalise ↔ Claude bridge</div>

  <div id="auth-prompt" class="auth-prompt" style="display:none">
    <div style="margin-bottom:8px">Paste your <code>WEBHOOK_SECRET</code> to enable the "Run backfill" button (stored in sessionStorage, not sent anywhere except this server):</div>
    <input type="password" id="secret-input" placeholder="WEBHOOK_SECRET" />
    <button onclick="saveSecret()">Save</button>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">Status</div>
      <div class="card-value" id="status-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">Uptime</div>
      <div class="card-value" id="uptime-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">Pending batches</div>
      <div class="card-value" id="batches-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">Errors (last hour)</div>
      <div class="card-value" id="errors-value">—</div>
    </div>
    <div class="card">
      <div class="card-label">Schedule</div>
      <div class="card-value" style="font-size:16px" id="cron-value">—</div>
    </div>
  </div>

  <div class="actions">
    <button id="backfill-btn" onclick="runBackfill()">Run backfill now</button>
    <button class="secondary" onclick="refresh()">Refresh</button>
  </div>

  <div class="events">
    <div class="events-header">
      <span>Recent events</span>
      <span style="font-size:12px;color:var(--muted)" id="event-count"></span>
    </div>
    <div id="events-list"></div>
  </div>

  <div class="footer">Auto-refreshes every 5 seconds.</div>

  <script>
    const SECRET_KEY = 'localisation_webhook_secret';

    function getSecret() {
      return sessionStorage.getItem(SECRET_KEY) || '';
    }
    function saveSecret() {
      const v = document.getElementById('secret-input').value.trim();
      if (v) {
        sessionStorage.setItem(SECRET_KEY, v);
        document.getElementById('auth-prompt').style.display = 'none';
      }
    }
    function ensureSecret() {
      if (!getSecret()) {
        document.getElementById('auth-prompt').style.display = 'block';
        return false;
      }
      return true;
    }

    function formatDuration(ms) {
      const s = Math.floor(ms / 1000);
      const days = Math.floor(s / 86400);
      const hrs = Math.floor((s % 86400) / 3600);
      const mins = Math.floor((s % 3600) / 60);
      if (days > 0) return `${days}d ${hrs}h`;
      if (hrs > 0) return `${hrs}h ${mins}m`;
      if (mins > 0) return `${mins}m`;
      return `${s}s`;
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/status');
        if (!res.ok) throw new Error('status ' + res.status);
        return await res.json();
      } catch (err) {
        return null;
      }
    }

    function render(data) {
      if (!data) {
        document.getElementById('status-value').textContent = 'Offline';
        document.getElementById('status-value').className = 'card-value value-err';
        return;
      }

      const statusEl = document.getElementById('status-value');
      const errors = data.errorsLastHour;
      if (errors === 0) {
        statusEl.textContent = 'Healthy';
        statusEl.className = 'card-value value-ok';
      } else if (errors < 5) {
        statusEl.textContent = 'Warning';
        statusEl.className = 'card-value value-warn';
      } else {
        statusEl.textContent = 'Errors';
        statusEl.className = 'card-value value-err';
      }

      document.getElementById('uptime-value').textContent = formatDuration(data.uptimeMs);
      document.getElementById('batches-value').textContent = data.pendingBatches;
      document.getElementById('errors-value').textContent = errors;
      document.getElementById('errors-value').className =
        'card-value ' + (errors === 0 ? 'value-ok' : errors < 5 ? 'value-warn' : 'value-err');
      document.getElementById('cron-value').textContent = data.cron;

      const list = document.getElementById('events-list');
      document.getElementById('event-count').textContent = `${data.events.length} events`;
      if (!data.events.length) {
        list.innerHTML = '<div class="empty">No events yet. Edit and review a translation in Lokalise to trigger one.</div>';
        return;
      }

      list.innerHTML = data.events.map(e => {
        let details = '';
        if (e.details) {
          const keys = Object.keys(e.details).filter(k => !['runId','opts'].includes(k));
          const parts = keys.slice(0, 4).map(k => {
            const v = e.details[k];
            if (typeof v === 'object') return `${k}=${JSON.stringify(v).slice(0, 40)}`;
            return `${k}=${v}`;
          });
          if (parts.length) details = `<div class="event-details">${parts.join(' · ')}</div>`;
        }
        return `
          <div class="event-row">
            <div class="event-time">${formatTime(e.timestamp)}</div>
            <div><span class="event-type type-${e.type}">${e.type.replace(/_/g, ' ')}</span></div>
            <div>
              <div class="event-message">${escapeHtml(e.message)}</div>
              ${details}
            </div>
          </div>
        `;
      }).join('');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
    }

    async function runBackfill() {
      if (!ensureSecret()) return;
      const btn = document.getElementById('backfill-btn');
      btn.disabled = true;
      btn.textContent = 'Starting...';
      try {
        const res = await fetch('/trigger/backfill', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Secret': getSecret(),
          },
          body: JSON.stringify({}),
        });
        if (res.status === 401) {
          sessionStorage.removeItem(SECRET_KEY);
          document.getElementById('auth-prompt').style.display = 'block';
          btn.textContent = 'Run backfill now';
          btn.disabled = false;
          alert('Secret rejected. Paste again.');
          return;
        }
        const data = await res.json();
        btn.textContent = `Started: ${data.runId}`;
        setTimeout(() => {
          btn.textContent = 'Run backfill now';
          btn.disabled = false;
          refresh();
        }, 2000);
      } catch (err) {
        btn.textContent = 'Failed';
        setTimeout(() => {
          btn.textContent = 'Run backfill now';
          btn.disabled = false;
        }, 2000);
      }
    }

    async function refresh() {
      const data = await fetchStatus();
      render(data);
    }

    // Show secret prompt on first load if missing.
    if (!getSecret()) {
      document.getElementById('auth-prompt').style.display = 'block';
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
